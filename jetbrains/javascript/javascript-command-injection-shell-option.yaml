rules:
- id: command-injection-spawn-shell-option
  message: >-
    Detected user input flowing into spawn/execFile with shell:true option. When the
    shell option is enabled, these functions behave like exec and interpret shell
    metacharacters, making them vulnerable to command injection. Either remove the
    shell:true option or ensure user input is properly validated and escaped.
  metadata:
    cwe:
    - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
    owasp:
    - A01:2017 - Injection
    - A03:2021 - Injection
    category: security
    technology:
    - javascript
    - nodejs
    references:
    - https://owasp.org/www-community/attacks/Command_Injection
    - https://cheatsheetseries.owasp.org/cheatsheets/Nodejs_Security_Cheat_Sheet.html
    cwe2022-top25: true
    cwe2021-top25: true
    subcategory:
    - vuln
    likelihood: HIGH
    impact: HIGH
    confidence: HIGH
  languages:
  - javascript
  - typescript
  severity: ERROR
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      # HTTP request sources
      - pattern: $REQ.query
      - pattern: $REQ.query.$PARAM
      - pattern: url.parse($REQ.url, ...).query
      - pattern: url.parse($REQ.url, ...).query.$PARAM
      - pattern: $REQ.body
      - pattern: $REQ.body.$PARAM
      - pattern: $REQ.params
      - pattern: $REQ.params.$PARAM
      - pattern: $CTX.params
      - pattern: $CTX.params.$PARAM
      - pattern: $CTX.query
      - pattern: $CTX.query.$PARAM
      # Command line arguments
      - pattern: process.argv
      - pattern: process.argv[$IDX]
      - pattern: process.argv.slice(...)
      - pattern: require('yargs').argv
      - pattern: require('minimist')(...)
      # GitHub Actions
      - pattern: $GITHUB.context.payload.$PROP
  pattern-sinks:
  - patterns:
    - pattern-either:
      # spawn/spawnSync/execFile with third argument (options) - catches shell:true cases
      - pattern: $CP.spawn($CMD, $ARGS, $OPTS)
      - pattern: spawn($CMD, $ARGS, $OPTS)
      - pattern: $CP.spawnSync($CMD, $ARGS, $OPTS)
      - pattern: spawnSync($CMD, $ARGS, $OPTS)
      - pattern: $CP.execFile($CMD, $ARGS, $OPTS, ...)
      - pattern: execFile($CMD, $ARGS, $OPTS, ...)
      - pattern: $CP.execFileSync($CMD, $ARGS, $OPTS)
      - pattern: execFileSync($CMD, $ARGS, $OPTS)
    - pattern-either:
      - pattern-inside: |
          $CP = require('child_process')
          ...
      - pattern-inside: |
          import $CP from 'child_process'
          ...
      - pattern-inside: |
          const { ..., spawn, ... } = require('child_process')
          ...
      - pattern-inside: |
          const { ..., spawnSync, ... } = require('child_process')
          ...
      - pattern-inside: |
          const { ..., execFile, ... } = require('child_process')
          ...
      - pattern-inside: |
          const { ..., execFileSync, ... } = require('child_process')
          ...
      - pattern-inside: |
          import { ..., spawn, ... } from 'child_process'
          ...
      - pattern-inside: |
          import { ..., spawnSync, ... } from 'child_process'
          ...
      - pattern-inside: |
          import { ..., execFile, ... } from 'child_process'
          ...
      - pattern-inside: |
          import { ..., execFileSync, ... } from 'child_process'
          ...
