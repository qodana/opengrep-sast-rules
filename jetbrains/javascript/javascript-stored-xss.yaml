rules:
  - id: javascript-stored-xss
    metadata:
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A07:2017 - Cross-Site Scripting (XSS)"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
    message: >-
      Stored data from files is written to an HTML response,
      resulting in a stored XSS vulnerability.
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint

    pattern-sources:
      - patterns:
          - pattern: $TORRENT.name
          - pattern-inside: |
              $PARSE_TORRENT = require('parse-torrent')
              ...
              $TORRENT = $PARSE_TORRENT(...)
              ...
      - patterns:
          - pattern-either:
              - pattern: $FS.readdir($DIR, function ($ERR, $FILES) { ... })
              - pattern: $FS.readdir($DIR, ($ERR, $FILES) => { ... })
              - pattern-inside: |
                  $FS = require('fs')
                  ...
          - focus-metavariable: $FILES

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $RES.send($VALUE, ...)
              - pattern: $RES.write($VALUE, ...)
              - pattern: $RES.end($VALUE, ...)
          - focus-metavariable: $VALUE

    pattern-propagators:
      - pattern: $FROM.forEach(function ($ITEM) { ... $TO.push($ITEM); ... })
        from: $FROM
        to: $TO
      - pattern: $FROM.forEach(function ($TO) { ... })
        from: $FROM
        to: $TO
      - pattern: $TO.push($FROM)
        from: $FROM
        to: $TO