rules:
  - id: javascript-client-side-url-redirect
    metadata:
      category: security
      cwe:
        - "CWE-601: URL Redirection to Untrusted Site ('Open Redirect')"
      owasp:
        - "A05:2017 - Broken Access Control"
        - "A01:2021 - Broken Access Control"
        - "A01:2025 - Broken Access Control"
    message: >-
      User-controlled input from the URL reaches a navigation sink,
      resulting in an open redirect vulnerability
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint

    pattern-sources:
      - pattern-either:
          - pattern: window.name
          - pattern: window.location
          - pattern: window.location.href
          - pattern: location.href
          - pattern: location.search
          - pattern: location.hash
          - pattern: document.location
          - pattern: document.location.href
          - pattern: document.location.search
          - pattern: document.location.hash
          - pattern: win.location.href
          - pattern: $location.search(...)
          - patterns:
              - pattern-either:
                  - pattern: $HISTORY.location.hash
                  - pattern-inside: |
                      $HISTORY = require('history').createBrowserHistory()
                      ...
                  - pattern-inside: |
                      $HISTORY_LIB = require('history')
                      ...
                      $HISTORY = $HISTORY_LIB.createBrowserHistory()
                      ...
      - patterns:
          - pattern-either:
              - pattern: self.onmessage = function ($EVENT) { ... }
              - pattern: window.onmessage = function ($EVENT) { ... }
              - pattern: self.onmessage = ($EVENT) => { ... }
              - pattern: window.onmessage = ($EVENT) => { ... }
          - focus-metavariable: $EVENT

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: window.location = $URL
              - pattern: document.location = $URL
              - pattern: location.href = $URL
              - pattern: window.location.href = $URL
              - pattern: window.open($URL, ...)
              - pattern: win.location.assign($URL)
              - pattern: window.location.replace($URL)
              - patterns:
                  - pattern: $SHELL.openExternal($URL)
                  - pattern-inside: |
                      import { $SHELL } from 'electron'
                      ...
              - pattern: $EL.href = $URL
              - pattern: $EL.src = $URL
              - pattern: $EL.action = $URL
              - pattern: $EL.formaction = $URL
              - pattern: $EL.data = $URL
              - patterns:
                  - pattern-either:
                      - pattern: $HISTORY.push($URL, ...)
                      - pattern: $HISTORY.replace($URL, ...)
                      - pattern-inside: |
                          $HISTORY = require('history').createBrowserHistory()
                          ...
                      - pattern-inside: |
                          $HISTORY_LIB = require('history')
                          ...
                          $HISTORY = $HISTORY_LIB.createBrowserHistory()
                          ...
              - pattern: $location.url($URL, ...)
              - pattern: importScripts($URL, ...)
              - pattern: self.importScripts($URL, ...)
              - pattern: $(...).attr("href", $URL, ...)
              - pattern: $(...).attr('href', $URL, ...)
          - focus-metavariable: $URL

    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: |
                  if ($URL.startsWith("$HOST")) {
                    ...
                  }
              - pattern: |
                  if ($URL.startsWith("$HOST" + ...)) {
                    ...
                  }
          - metavariable-regex:
              metavariable: $HOST
              regex: '^(https?:)?//[^/]+(?:/.*)?$'
          - focus-metavariable: $URL
        by-side-effect: true
