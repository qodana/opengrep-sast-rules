rules:
  - id: javascript-xss-through-dom
    metadata:
      shortDescription: "HTML DOM text is reinterpreted again"
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A07:2017 - Cross-Site Scripting (XSS)"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
    message: >-
      HTML DOM text is reinterpreted again, as HTML might lead to DOM-based XSS
    languages:
      - javascript
      - typescript
    severity: WARNING
    mode: taint

    pattern-sources:
      - pattern-either:
          - pattern: $($SELECTOR).val()
          - pattern: $($SELECTOR).text()
          - pattern: $($SELECTOR).attr($NAME)
          - pattern: $($SELECTOR).prop("innerText")
          - pattern: $($SELECTOR).get($IDX).name
          - pattern: $($SELECTOR).get($IDX).getAttribute($NAME)
          - pattern: $($SELECTOR)[$IDX].name
          - pattern: $($SELECTOR)[$IDX].value
          - pattern: $($SELECTOR).find($FINDER)[$IDX].value
          - pattern: $($SELECTOR).find($FINDER).attr($NAME)
          - pattern: document.$FORM.$INPUT.value
          - pattern: document.getElementById($ID).innerText
          - pattern: document.getElementById($ID).textContent
          - pattern: document.getElementById($ID).src
          - pattern: document.getElementById($ID).value
          - pattern: document.getElementById($ID).getAttribute($NAME)
          - pattern: document.querySelectorAll($SELECTOR)[$IDX].value
          - pattern: $EVENT.value
          - pattern: $EVENT.target.value
          - pattern: $EVENT.target.files
          - pattern: $EVENT.target.files[$IDX].name
          - patterns:
              - pattern: useFormikContext()
              - pattern-inside: |
                  import { ..., useFormikContext, ... } from "formik"
                  ...
          - patterns:
              - pattern: useForm()
              - pattern-inside: |
                  import { ..., useForm, ... } from "react-hook-form"
                  ...
      - patterns:
          - pattern-either:
              - pattern: 'validate: $VALUES => { ... }'
              - pattern: 'handleSubmit: ($VALUES, ...) => { ... }'
              - pattern-inside: |
                  import { ..., withFormik, ... } from "formik"
                  ...
                  withFormik({...})
          - focus-metavariable: $VALUES

    pattern-sinks:
      - patterns:
          - pattern-either:
              - patterns:
                  - pattern: $($VALUE)
                  - pattern-not: $($VALUE).text(...)
                  - pattern-not-inside: |
                      if ($VALUE.jquery) {
                          ...
                      }
                  - pattern-not-inside: |
                      if (typeof $VALUE === "object") {
                          ...
                      }
              - pattern: $EL.html($VALUE, ...)
              - pattern: $($EL).html($VALUE, ...)
              - pattern: $($EL).get($IDX).innerHTML = $VALUE
              - pattern: $EL.innerHTML = $VALUE
              - pattern: document.write($VALUE, ...)
              - pattern: $.jGrowl($VALUE, ...)
              - pattern: '$($TAG, { html: $VALUE, ... })'
          - focus-metavariable: $VALUE

    pattern-sanitizers:
      - pattern-either:
          - pattern: $SANITIZER.sanitize(...)
          - pattern: '$SANITIZER ? $SANITIZER.sanitize(...) : ...'
