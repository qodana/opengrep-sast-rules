rules:
  - id: javascript-unsafe-jquery-plugin
    metadata:
      shortDescription: "jQuery plugin option data reaches a selector sink"
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A07:2017 - Cross-Site Scripting (XSS)"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
    message: >-
      jQuery plugin option data reaches a selector sink, resulting in cross-site scripting injection
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint

    pattern-sources:
      # $.fn.<plugin> = function(...)
      - patterns:
          - pattern-either:
              - pattern: |
                  $.fn.$PLUGIN = function($OPTIONS) {
                    ...
                  }
              - pattern: |
                  $.fn.$PLUGIN = function $FUNC($OPTIONS) {
                    ...
                  }
              - pattern: |
                  $.fn.$PLUGIN = function($ELEMENT, $OPTIONS) {
                    ...
                  }
              - pattern: |
                  $.fn.$PLUGIN = function $FUNC($ELEMENT, $OPTIONS) {
                    ...
                  }
          - focus-metavariable: $OPTIONS
      # $.fn[<plugin>] = function(...)
      - patterns:
          - pattern-either:
              - pattern: |
                  $.fn[$PLUGIN] = function($OPTIONS) {
                    ...
                  }
              - pattern: |
                  $.fn[$PLUGIN] = function $FUNC($OPTIONS) {
                    ...
                  }
              - pattern: |
                  $.fn[$PLUGIN] = function($ELEMENT, $OPTIONS) {
                    ...
                  }
              - pattern: |
                  $.fn[$PLUGIN] = function $FUNC($ELEMENT, $OPTIONS) {
                    ...
                  }
          - focus-metavariable: $OPTIONS
      # $.extend($.fn, { <plugin>: function(...) })
      - patterns:
          - pattern-either:
              - pattern: |
                  $.extend($.fn, {
                    ...,
                    $PLUGIN: function($OPTIONS) {
                      ...
                    },
                    ...
                  })
              - pattern: |
                  $.extend($.fn, {
                    ...,
                    $PLUGIN: function $FUNC($OPTIONS) {
                      ...
                    },
                    ...
                  })
          - focus-metavariable: $OPTIONS
      - patterns:
          - pattern-either:
              - pattern: |
                  setupPlugin({
                    ...,
                    f: function($OPTIONS) {
                      ...
                    },
                    ...
                  })
              - pattern: |
                  setupPlugin({
                    ...,
                    f: function $FUNC($OPTIONS) {
                      ...
                    },
                    ...
                  })
          - focus-metavariable: $OPTIONS

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $($VALUE)
              - pattern: $($ELEMENT).appendTo($VALUE)
          - focus-metavariable: $VALUE
          - pattern-not: $("#" + $VALUE)
          - pattern-not: $("#" + $OBJECT.$FIELD)
          - pattern-not: $($ANY + $VALUE)
          - pattern-not: $($ANY + $OBJECT.$FIELD)
          - pattern-not: $($ANY.replace(..., $VALUE))
          - pattern-not: $($ANY.replace(..., $OBJECT.$FIELD))
          - pattern-not-inside: |
              $VALUE === $A.$B? $($VALUE): ...
          - pattern-not-inside: |
              if ($METHOD($VALUE)) {
                ...
              }
          - pattern-not-inside: |
              if (typeof $VALUE != "string") {
                ...
              }
          - pattern-not-inside: |
              if ($VALUE.jquery !== undefined) {
                ...
              }
          - pattern-not-inside: |
              if (typeof $VALUE.jquery !== "undefined") {
                ...
              }
          - pattern-not-inside: |
              if ($VALUE.jquery) {
                ...
              }
          - pattern-not-inside: |
              if (!!$VALUE.jquery) {
                ...
              }
          - pattern-not-inside: |
              if ($SAFE.has($VALUE))
                ...
