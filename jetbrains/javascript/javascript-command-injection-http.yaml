rules:
  - id: javascript-command-injection-http
    message: >-
      Detected user input from HTTP request flowing into a command execution function.
      This could lead to a command injection vulnerability where an attacker could execute
      arbitrary commands on the system.
    metadata:
      shortDescription: "User input from HTTP request flowing into a command execution"
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      owasp:
        - "A01:2017 - Injection"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
      category: security
      technology:
        - javascript
        - nodejs
      references:
        - https://owasp.org/www-community/attacks/Command_Injection
        - https://cheatsheetseries.owasp.org/cheatsheets/Nodejs_Security_Cheat_Sheet.html
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory:
        - vuln
      likelihood: HIGH
      impact: HIGH
      confidence: MEDIUM
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint

    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $REQ.query
              - pattern: $REQ.query.$PARAM
              - pattern: $REQ.body
              - pattern: $REQ.body.$PARAM
              - pattern: $REQ.params
              - pattern: $REQ.params.$PARAM
              - pattern: $REQ.request.query
              - pattern: $REQ.request.body
              - pattern: $REQ.headers
              - pattern: $REQ.headers.$HEADER
              - pattern: $REQ.file
              - pattern: $REQ.file.$PROP
              - pattern: $REQ.files
              - pattern: $REQ.files.$PROP
              - pattern: $REQ.files[$IDX]
              - pattern: $REQ.files[$IDX].$PROP
      - patterns:
          - pattern-either:
              - pattern: $OBJ.$METHOD($EVENT, function ($VALUE) { ... })
              - pattern: $OBJ.$METHOD($EVENT, function (..., $VALUE) { ... })
              - pattern: $OBJ.$METHOD($EVENT, function (..., $VALUE, ...) { ... })
              - pattern: $OBJ.$METHOD($EVENT, ($VALUE) => { ... })
              - pattern: $OBJ.$METHOD($EVENT, (..., $VALUE) => { ... })
              - pattern: $OBJ.$METHOD($EVENT, (..., $VALUE, ...) => { ... })
              - pattern-inside: |
                  require("https")
                  ...
              - pattern-inside: |
                  require("busboy")
                  ...
              - pattern-inside: |
                  require("formidable")
                  ...
              - pattern-inside: |
                  require("multiparty")
                  ...
          - metavariable-regex:
              metavariable: $METHOD
              regex: '^(on|parse)$'
          - focus-metavariable: $VALUE

    pattern-sinks:
      # Promisified child_process
      - patterns:
          - pattern: $VAR.$METHOD($CMD, ...)
          - pattern-inside: |
              $CP = require('child_process')
              ...
          - pattern-inside: |
              $VAR = $PROMISIFY_FN($CP)
              ...
          - metavariable-regex:
              metavariable: $METHOD
              regex: '^(exec|execSync|execFile|execFileSync|spawn|spawnSync)$'
          - focus-metavariable: $CMD
      - patterns:
          - pattern: $VAR.$METHOD($CMD, ...)
          - pattern-inside: |
              $VAR = $PROMISIFY_FN(require('child_process'), ...)
              ...
          - metavariable-regex:
              metavariable: $METHOD
              regex: '^(exec|execSync|execFile|execFileSync|spawn|spawnSync)$'
          - focus-metavariable: $CMD
      - patterns:
          - pattern: $FUNC($CMD, ...)
          - pattern-inside: |
              $CP = require('child_process')
              ...
          - pattern-inside: |
              $FUNC = $PROMISIFY($CP.$EXEC_METHOD, ...)
              ...
          - metavariable-regex:
              metavariable: $EXEC_METHOD
              regex: '^(exec|execSync|execFile|execFileSync|spawn|spawnSync)$'
          - focus-metavariable: $CMD
      - patterns:
          - pattern: $FUNC($CMD, ...)
          - pattern-inside: |
              $CP = require('child_process')
              ...
          - pattern-inside: |
              $FUNC = $PROMISIFY($CP.$EXEC_METHOD.bind(...), ...)
              ...
          - metavariable-regex:
              metavariable: $EXEC_METHOD
              regex: '^(exec|execSync|execFile|execFileSync|spawn|spawnSync)$'
          - focus-metavariable: $CMD

      - patterns:
          - pattern-either:
              # child_process.exec and variants
              - patterns:
                  - pattern-either:
                      - pattern: $CP.exec($CMD)
                      - pattern: $CP.execSync($CMD)
                      - pattern: exec($CMD)
                      - pattern: execSync($CMD)
                  - focus-metavariable: $CMD
              # child_process.spawn and spawnSync
              - patterns:
                  - pattern-either:
                      - pattern: $CP.spawn($CMD, ...)
                      - pattern: $CP.spawnSync($CMD, ...)
                      - pattern: spawn($CMD, ...)
                      - pattern: spawnSync($CMD, ...)
                  - focus-metavariable: $CMD
              - patterns:
                  - pattern-either:
                      - pattern: $CP.spawn($CMD, $ARGS)
                      - pattern: $CP.spawn($CMD, $ARGS, $OPTS)
                      - pattern: $CP.spawnSync($CMD, $ARGS)
                      - pattern: $CP.spawnSync($CMD, $ARGS, $OPTS)
                      - pattern: spawn($CMD, $ARGS)
                      - pattern: spawn($CMD, $ARGS, $OPTS)
                      - pattern: spawnSync($CMD, $ARGS)
                      - pattern: spawnSync($CMD, $ARGS, $OPTS)
                  - focus-metavariable: $ARGS
              # child_process.execFile and execFileSync
              - patterns:
                  - pattern-either:
                      - pattern: $CP.execFile($CMD, ...)
                      - pattern: $CP.execFileSync($CMD, ...)
                      - pattern: execFile($CMD, ...)
                      - pattern: execFileSync($CMD, ...)
                  - focus-metavariable: $CMD
              - patterns:
                  - pattern-either:
                      - pattern: $CP.execFile($FILE, $ARGS)
                      - pattern: $CP.execFile($FILE, $ARGS, $OPTS, ...)
                      - pattern: $CP.execFileSync($FILE, $ARGS)
                      - pattern: $CP.execFileSync($FILE, $ARGS, $OPTS)
                      - pattern: execFile($FILE, $ARGS)
                      - pattern: execFile($FILE, $ARGS, $OPTS, ...)
                      - pattern: execFileSync($FILE, $ARGS)
                      - pattern: execFileSync($FILE, $ARGS, $OPTS)
                  - focus-metavariable: $ARGS
              # child_process.fork
              - patterns:
                  - pattern-either:
                      - pattern: $CP.fork($CMD, ...)
                      - pattern: fork($CMD, ...)
                  - focus-metavariable: $CMD
              # spawn with shell arguments
              - patterns:
                  - pattern-either:
                      - pattern: $CP.spawn($SH, [$FLAG, $CMD, ...], ...)
                      - pattern: spawn($SH, [$FLAG, $CMD, ...], ...)
                  - metavariable-regex:
                      metavariable: $FLAG
                      regex: ^["\'](-c|/c|/C)["\']$
                  - focus-metavariable: $CMD
              # execFile with shell and dangerous args
              - patterns:
                  - pattern-either:
                      - pattern: $CP.execFile($SH, [..., $CMD, ...], ...)
                      - pattern: execFile($SH, [..., $CMD, ...], ...)
                  - focus-metavariable: $CMD
          - pattern-either:
              - pattern-inside: |
                  $CP = require('child_process')
                  ...
              - pattern-inside: |
                  import $CP from 'child_process'
                  ...
              - pattern-inside: |
                  import * as $CP from 'child_process'
                  ...
              - pattern-inside: |
                  import { ..., exec, ... } from 'child_process'
                  ...
              - pattern-inside: |
                  import { ..., execSync, ... } from 'child_process'
                  ...
              - pattern-inside: |
                  import { ..., spawn, ... } from 'child_process'
                  ...
              - pattern-inside: |
                  import { ..., spawnSync, ... } from 'child_process'
                  ...
              - pattern-inside: |
                  import { ..., execFile, ... } from 'child_process'
                  ...
              - pattern-inside: |
                  import { ..., execFileSync, ... } from 'child_process'
                  ...
              - pattern-inside: |
                  import { ..., fork, ... } from 'child_process'
                  ...
              - pattern-inside: |
                  $EXEC = require('child_process').exec
                  ...
              - pattern-inside: |
                  $EXEC = require('child_process').execSync
                  ...
              - pattern-inside: |
                  $SPAWN = require('child_process').spawn
                  ...
              - pattern-inside: |
                  $SPAWN = require('child_process').spawnSync
                  ...
              - pattern-inside: |
                  $EXECFILE = require('child_process').execFile
                  ...
              - pattern-inside: |
                  $EXECFILE = require('child_process').execFileSync
                  ...
              - pattern-inside: |
                  $FORK = require('child_process').fork
                  ...
              - pattern-inside: |
                  const { ..., exec, ... } = require('child_process')
                  ...
              - pattern-inside: |
                  const { ..., execSync, ... } = require('child_process')
                  ...
              - pattern-inside: |
                  const { ..., spawn, ... } = require('child_process')
                  ...
              - pattern-inside: |
                  const { ..., spawnSync, ... } = require('child_process')
                  ...
              - pattern-inside: |
                  const { ..., execFile, ... } = require('child_process')
                  ...
              - pattern-inside: |
                  const { ..., execFileSync, ... } = require('child_process')
                  ...
              - pattern-inside: |
                  const { ..., fork, ... } = require('child_process')
                  ...

    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - patterns:
                  - pattern: $SANITIZER($VALUE)
                  - metavariable-regex:
                      metavariable: $SANITIZER
                      regex: '^(sanitize\w+|(clean|clear)\w+|\w+[Ss]anitizer|(isSafe|isValid)\w*)$'
              - pattern: parseInt(...)
              - pattern: parseFloat(...)
              - pattern: Number(...)
              - pattern: |
                  if (typeof $VALUE === "number") {
                    ...
                  }
              - pattern: |
                  if (!isNaN($VALUE)) {
                    ...
                  }
              - pattern: |
                  if (!isNaN($PARSE($VALUE))) {
                    ...
                  }

    pattern-propagators:
      - pattern: ($PRG).parse($ARGS, ...)
        from: $ARGS
        to: $PRG
