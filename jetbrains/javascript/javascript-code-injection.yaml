rules:
  - id: javascript-code-injection
    metadata:
      category: security
      cwe:
        - "CWE-94: Improper Control of Generation of Code ('Code Injection')"
      owasp:
        - "A01:2017 - Injection"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
    message: User-controlled input reaches dynamic code execution.
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint

    pattern-sources:
      - pattern-either:
          - pattern: $REQ.param(...)
          - pattern: $REQ.body
          - pattern: $REQ.body.$KEY
          - pattern: $REQ.body[$KEY]
          - pattern: $REQ.query
          - pattern: $REQ.query.$KEY
          - pattern: $REQ.query[$KEY]
          - pattern: $REQ.params
          - pattern: $REQ.params.$KEY
          - pattern: $REQ.params[$KEY]
          - pattern: $REQUEST.query
          - pattern: $REQUEST.query.$KEY
          - pattern: $REQUEST.query[$KEY]
          - pattern: document.location
          - pattern: document.location.href
          - pattern: document.location.search
          - pattern: document.location.hash
          - pattern: location.search
          - pattern: location.hash
          - pattern: github.context.payload.commits[$IDX].message
      - patterns:
          - pattern-either:
              - pattern: $WS.on("message", function ($VALUE) { ... })
              - pattern: $WS.on('message', function ($VALUE) { ... })
              - pattern: $WS.on("message", ($VALUE) => { ... })
              - pattern: $WS.on('message', ($VALUE) => { ... })
              - pattern: '$NAME: ({ $VALUE }) => { ... }'
              - pattern: 'resolve: ($ROOT, { $VALUE }, ...) => { ... }'
              - pattern: export async function $FN($VALUE) { ... }
              - pattern: export function unsafeDeserialize($VALUE) { ... }
              - pattern: global.unsafeDeserialize = function ($VALUE) { ... }
              - pattern: export function unsafeGetter($OBJ, $VALUE) { ... }
              - pattern: export function greySink($VALUE) { ... }
              - pattern: $RESPONSE.on("data", $VALUE => { ... })
              - pattern: $RESPONSE.on('data', $VALUE => { ... })
              - pattern: 'return `(function(){${JSON.stringify($VALUE)}))`'
              - pattern: 'var $FOO = `(function(){${JSON.stringify($VALUE)}))`'
              - pattern: 'return `(() => {${JSON.stringify($VALUE)})`'
              - pattern: 'return `() => {${JSON.stringify($VALUE)}`'
              - pattern: htmlescape($VALUE)
          - focus-metavariable: $VALUE

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: eval($VALUE)
              - pattern: new Function($VALUE, ...)
              - pattern: require("vm").runInThisContext($VALUE, ...)
              - pattern: require('vm').runInThisContext($VALUE, ...)
              - pattern: $VM.runInThisContext($VALUE, ...)
              - pattern: $VM.runInNewContext($VALUE, ...)
              - pattern: $VM.runInContext($VALUE, ...)
              - pattern: $VM.compileFunction($VALUE, ...)
              - pattern: new $VM.Script($VALUE, ...)
              - pattern: new $VM.SourceTextModule($VALUE, ...)
              - pattern: $MODULE._compile($VALUE, ...)
              - pattern: |
                  $PTY = require('node-pty')
                  ...
                  $SHELL = $PTY.spawn(...)
                  ...
                  $SHELL.write($VALUE, ...)
              - pattern: "$CP.execFileSync('node', ['-e', $VALUE], ...)"
              - pattern: '$CP.execFileSync("node", ["-e", $VALUE], ...)'
              - pattern: $SCOPE.$apply($VALUE, ...)
              - pattern: $SCOPE.$applyAsync($VALUE, ...)
              - pattern: $SCOPE.$eval($VALUE, ...)
              - pattern: $SCOPE.$evalAsync($VALUE, ...)
              - pattern: $SCOPE.$watch($VALUE, ...)
              - pattern: $SCOPE.$watchCollection($VALUE, ...)
              - pattern: $SCOPE.$watchGroup($VALUE, ...)
              - pattern: $FILTER('orderBy')($ARRAY, $VALUE, ...)
              - pattern: $FILTER("orderBy")($ARRAY, $VALUE, ...)
              - pattern: 'doc.find({ $where: $VALUE, ... })'
              - pattern: '$DOC.find({ $where: $VALUE, ... })'
              - pattern: 'return { $where: $VALUE, ... }'
              - pattern: $($EL).attr("onclick", $VALUE, ...)
              - pattern: $($EL).attr('onclick', $VALUE, ...)
              - pattern: pug.compile($VALUE, ...)
              - pattern: pug.render($VALUE, ...)
              - pattern: jade.compile($VALUE, ...)
              - pattern: jade.render($VALUE, ...)
              - pattern: dot.template($VALUE, ...)
              - pattern: dot.compile($VALUE, ...)
              - pattern: ejs.render($VALUE, ...)
              - pattern: nunjucks.renderString($VALUE, ...)
              - pattern: lodash.template($VALUE, ...)
              - pattern: handlebars.compile($VALUE, ...)
              - pattern: mustache.render($VALUE, ...)
              - pattern: Hogan.compile($VALUE, ...)
              - pattern: Eta.render($VALUE, ...)
              - pattern: Sqrl.render($VALUE, ...)
              - pattern: webix.exec($VALUE, ...)
              - pattern: 'webix.ui({ template: $VALUE, ... })'
              - pattern: $WEBVIEW.injectJavaScript($VALUE, ...)
              - pattern: 'const $STR = `...${$VALUE}...`'
          - focus-metavariable: $VALUE
      - patterns:
          - pattern: '<WebView ... injectedJavaScript={$VALUE} ... />'
          - focus-metavariable: $VALUE
      - patterns:
          - pattern: '<script ...>{$VALUE}</script>'
          - focus-metavariable: $VALUE
      - patterns:
          - pattern: |
              $RUN_C = require('vm').runInNewContext
              ...
              $RUN_C($VALUE)
          - focus-metavariable: $VALUE
      - pattern-either:
          - pattern: new Function($VALUE, ...)
          - pattern: Function($VALUE, ...)
          - pattern: require("vm").runInThisContext($VALUE, ...)
          - pattern: require('vm').runInThisContext($VALUE, ...)
          - pattern: $VM.runInThisContext($VALUE, ...)
          - pattern: $VM.runInNewContext($VALUE, ...)
          - pattern: $VM.runInContext($VALUE, ...)
          - pattern: $VM.compileFunction($VALUE, ...)
          - pattern: new $VM.Script($VALUE, ...)
          - pattern: new $VM.SourceTextModule($VALUE, ...)
          - pattern: WebAssembly.compile($VALUE, ...)
          - pattern: WebAssembly.compileStreaming($VALUE, ...)
          # https://developer.mozilla.org/en-US/docs/Web/API/Window/setTimeout
          - pattern: setTimeout($VALUE, ...)

    pattern-propagators:
      - pattern: $TO = $FROM
        from: $FROM
        to: $TO
      - pattern: $TO = await $FROM
        from: $FROM
        to: $TO
      - pattern: $TO = $FROM.$FIELD
        from: $FROM
        to: $TO
      - pattern: $TO = $FROM[$KEY]
        from: $FROM
        to: $TO
      - pattern: $TO.$FIELD = $FROM
        from: $FROM
        to: $TO
      - pattern: $TO = $FROM + $OTHER
        from: $FROM
        to: $TO
      - pattern: $TO = $OTHER + $FROM
        from: $FROM
        to: $TO
      - pattern: $TO = $FROM.$METHOD(...)
        from: $FROM
        to: $TO
      - pattern: $TO = $METHOD($FROM, ...)
        from: $FROM
        to: $TO
      - pattern: $TO = new $CLASS($FROM, ...)
        from: $FROM
        to: $TO
      - pattern: $TO = [$FROM, ...]
        from: $FROM
        to: $TO
      - pattern: '$TO = { ..., $KEY: $FROM, ... }'
        from: $FROM
        to: $TO

    pattern-sanitizers:
      - patterns:
          - pattern: JSON.stringify($VALUE)
          - focus-metavariable: $VALUE
        by-side-effect: true