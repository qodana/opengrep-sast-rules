rules:
  - id: javascript-reflected-xss
    metadata:
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A07:2017 - Cross-Site Scripting (XSS)"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
    message: >-
      User-controlled input from an HTTP request is reflected in an HTML response, 
      resulting in a reflected XSS vulnerability.
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint

    pattern-sources:
      - pattern-either:
          - pattern: $REQ.body
          - pattern: $REQ.body.$KEY
          - pattern: $REQ.query
          - pattern: $REQ.query.$KEY
          - pattern: $REQ.query[$KEY]
          - pattern: $REQ.params
          - pattern: $REQ.params.$KEY
          - pattern: $REQ.params[$KEY]
          - pattern: $REQ.url
          - pattern: $REQ.json()

    pattern-sinks:
      - patterns:
          - pattern: $RES.$SINK($VALUE, ...)
          - metavariable-regex:
              metavariable: $SINK
              regex: '^(send|end|write)$'
          - pattern-inside:
              pattern-either:
                # Express-style: 2-param callbacks
                - pattern: |
                    $APP.$METHOD($PATH, function($REQ, $RES) {
                      ...
                    })
                - pattern: |
                    $APP.$METHOD($PATH, ($REQ, $RES) => {
                      ...
                    })
                - pattern: |
                    $APP.$METHOD(function($REQ, $RES) {
                      ...
                    })
                - pattern: |
                    $APP.$METHOD(($REQ, $RES) => {
                      ...
                    })
                - pattern: |
                    $APP.$METHOD($PATH, function($REQ, $RES, $NEXT) {
                      ...
                    })
                - pattern: |
                    $APP.$METHOD($PATH, ($REQ, $RES, $NEXT) => {
                      ...
                    })
                - pattern: |
                    $APP.$METHOD(function($REQ, $RES, $NEXT) {
                      ...
                    })
                - pattern: |
                    function($REQ, $RES, $NEXT) {
                      ...
                    }
                - pattern: |
                    ($REQ, $RES, $NEXT) => {
                      ...
                    }
                - pattern: |
                    export default function $FUNC($REQ, $RES) {
                      ...
                    }
                - pattern: |
                    export async function $FUNC($CTX) {
                      ...
                      $RES = $CTX.res
                      ...
                    }
                - pattern: |
                    $PROP = async ($CTX) => {
                      ...
                      $RES = $CTX.res
                      ...
                    }
          - pattern-not-inside:
              pattern-either:
                - pattern: |
                    $RES.$SET("Content-Type", "text/plain")
                    ...
                    $RES.$SINK($VALUE, ...)
                - pattern: |
                    $RES.$SET("Content-Type", "application/json")
                    ...
                    $RES.$SINK($VALUE, ...)
                - pattern: |
                    $RES.$SET("Content-Type", "text/plain; charset=utf-8")
