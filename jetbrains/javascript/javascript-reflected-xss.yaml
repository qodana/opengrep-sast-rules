    pattern-sanitizers:
      - pattern-either:
          - pattern: $REQ.cookies[...]
          - pattern: console.log(...)
          - patterns:
              - pattern: $SERIALIZE(...)
              - pattern-not: '$SERIALIZE(..., {unsafe: true})'
              - pattern-inside: |
                  $SERIALIZE = require("serialize-javascript")
                  ...
          - patterns:
              - pattern: $REMARK().use($SANITIZE).$METHOD(...)
              - pattern-inside: |
                  $REMARK = require("remark")
                  ...
              - pattern-inside: |
                  $SANITIZE = require("rehype-sanitize")
                  ...
          - patterns:
              - pattern: $MARKDOWN.use($SANITIZE).$METHOD(...)
              - metavariable-pattern:
                  metavariable: $SANITIZE
                  pattern: require("markdown-it-sanitizer")
          - patterns:
              - pattern: $SAFE_MARKDOWN.render(...)
              - pattern-inside: |
                  $SAFE_MARKDOWN = require("markdown-it")($OPTIONS)
                  ...
              - metavariable-pattern:
                  metavariable: $OPTIONS
                  patterns:
                    - pattern-not: '{html: true}'
          - patterns:
              - pattern: $ESCAPE(...)
              - metavariable-regex:
                  metavariable: $ESCAPE
                  regex: '^(escape|encode).*$'
          - patterns:
              - pattern: $OBJ.$ESCAPE(...)
              - metavariable-regex:
                  metavariable: $ESCAPE
                  regex: '^(escape|encode).*$'

    pattern-propagators:
      - pattern: $PROCESS.process($INPUT, function ($ERR, $VALUE) { ... })
        from: $INPUT
        to: $VALUE
