rules:
  - id: javascript-command-injection-other-exec-libraries
    message: >-
      Detected user input flowing into command execution functions from various libraries
      (async-execute, mz/child_process, exec-sh, etc.). This could lead to a command
      injection vulnerability. Validate and sanitize user input before passing to command
      execution functions.
    metadata:
      shortDescription: "User input flowing into command execution from a library"
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      owasp:
        - "A01:2017 - Injection"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
      category: security
      technology:
        - javascript
        - nodejs
      references:
        - https://owasp.org/www-community/attacks/Command_Injection
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory:
        - vuln
      likelihood: HIGH
      impact: HIGH
      confidence: MEDIUM
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint

    pattern-sources:
      - patterns:
          - pattern-either:
              # HTTP request sources
              - pattern: $REQ.query
              - pattern: $REQ.query.$PARAM
              - pattern: url.parse($REQ.url, ...).query
              - pattern: url.parse($REQ.url, ...).query.$PARAM
              - pattern: $REQ.body
              - pattern: $REQ.body.$PARAM
              - pattern: $REQ.params
              - pattern: $REQ.params.$PARAM
              - pattern: $CTX.params
              - pattern: $CTX.params.$PARAM
              - pattern: $CTX.query
              - pattern: $CTX.query.$PARAM
              # Command line arguments
              - pattern: process.argv
              - pattern: process.argv[$IDX]
              - pattern: process.argv.slice(...)
              - pattern: require('yargs').argv
              - pattern: require('minimist')(...)

    pattern-sinks:
      - patterns:
          - pattern-either:
              # mz/child_process - command argument
              - patterns:
                  - pattern-either:
                      - pattern: $MZCP.exec($CMD)
                      - pattern: $MZCP.execFile($CMD, ...)
                      - pattern: $MZCP.spawn($CMD, ...)
                  - focus-metavariable: $CMD
              # mz/child_process execFile - args argument
              - patterns:
                  - pattern-either:
                      - pattern: $MZCP.execFile($FILE, $ARGS)
                      - pattern: $MZCP.execFile($FILE, $ARGS, $OPTS, ...)
                  - focus-metavariable: $ARGS
              # mz/child_process spawn - args argument
              - patterns:
                  - pattern-either:
                      - pattern: $MZCP.spawn($CMD, $ARGS)
                      - pattern: $MZCP.spawn($CMD, $ARGS, $OPTS)
                  - focus-metavariable: $ARGS
              # promisified child_process - only specific patterns
              - patterns:
                  - pattern-either:
                      - pattern: $UTIL.promisify($CP.exec)($CMD)
                      - pattern: $UTIL.promisify(require('child_process').exec)($CMD)
                  - focus-metavariable: $CMD
          - pattern-either:
              # mz/child_process
              - pattern-inside: |
                  $MZCP = require('mz/child_process')
                  ...
              - pattern-inside: |
                  import $MZCP from 'mz/child_process'
                  ...
              # promisified exec - require child_process module check
              - pattern-inside: |
                  $CP = require('child_process')
                  ...
              - pattern-inside: |
                  import $CP from 'child_process'
                  ...
