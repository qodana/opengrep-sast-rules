rules:
  - id: javascript-server-side-url-redirect
    metadata:
      category: security
      cwe:
        - "CWE-601: URL Redirection to Untrusted Site ('Open Redirect')"
      owasp:
        - "A05:2017 - Broken Access Control"
        - "A01:2021 - Broken Access Control"
        - "A01:2025 - Broken Access Control"
    message: >-
      User-controlled input from the URL used in a server-side redirect,
      resulting in an open redirect vulnerability
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint

    pattern-sources:
      - pattern-either:
          - pattern: $REQ.url
          - pattern: $REQ._parsedUrl
          - pattern: $REQ.nextUrl
          - pattern: $REQ.query
          - pattern: $REQ.query.$PARAM
          - pattern: $REQ.query[$PARAM]
          - pattern: $REQ.params
          - pattern: $REQ.params.$PARAM
          - pattern: $REQ.body
          - pattern: $REQ.body.$PARAM
          - pattern: $REQ.param(...)
          - pattern: query.$PARAM

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $RES.redirect($URL, ...)
              - pattern: $RES.header("Location", $URL, ...)
              - pattern: $RES.set("Location", $URL, ...)
              - pattern: $RES.setHeader("Location", $URL)
              - pattern: |
                  $RES.writeHead($CODE, { Location: $URL }, ...)
              - pattern: '<WebView ... url={$URL} ... />'
              - pattern: '<WebView ... source={$URL} ... />'
          - focus-metavariable: $URL

    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: $RES.redirect("..." + $URL)
              - pattern: $RES.redirect($FN() + "..." + $URL)
              - pattern: $RES.redirect($FN() + ($ANY + $URL))
              - pattern: $RES.redirect(["...", $URL].$FN(...))
              - pattern: $RES.redirect([...].$FN(...) + "..." + $URL)
              - pattern: |
                  $RES.writeHead(..., { Location: "..." + $URL }, ...)
              - pattern: |
                  if ($URL === $ANY) {
                    ...
                  }
              - pattern: |
                  if ($ANY === $URL) {
                    ...
                  }
              - pattern: |
                  if ($URL === "...") {
                    ...
                  }
              - pattern: |
                  if ("..." === $URL) {
                    ...
                  }
              - pattern: |
                  if ($ANY.hasOwn(..., $URL)) {
                    ...
                  }
              - pattern: |
                  if ($ANY.hasOwnProperty($URL)) {
                    ...
                  }
              - pattern: |
                  if ($URL in $ANY)
                    ...
              - pattern: |
                  if ($ANY[$URL] != undefined) {
                    ...
                  }
          - focus-metavariable: $URL
        by-side-effect: true
      - patterns:
          - pattern-either:
              - pattern: |
                  if ($URL.startsWith("$HOST")) {
                    ...
                  }
              - pattern: |
                  if ($URL.startsWith("$HOST" + ...)) {
                    ...
                  }
          - metavariable-regex:
              metavariable: $HOST
              regex: '^(https?:)?//[^/]+(?:/.*)?$'
          - focus-metavariable: $URL
        by-side-effect: true