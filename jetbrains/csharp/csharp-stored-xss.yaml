rules:
  - id: csharp-stored-xss
    metadata:
      shortDescription: "User input from the database is used in HTML"
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A07:2017 - Cross-Site Scripting (XSS)"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
    languages: [ csharp ]
    severity: ERROR
    message: >-
      User-controlled input previously stored in the database and returned in an HTML response
      may introduce a stored XSS vulnerability
    mode: taint

    pattern-sources:
      - patterns:
          - pattern: $CMD.ExecuteReader()
          - pattern-either:
              - pattern-inside: |
                  SqlCommand $CMD = new SqlCommand(...);
                  ...
              - pattern-inside: |
                  var $CMD = new SqlCommand(...);
                  ...

    pattern-sinks:
      - patterns:
          - pattern: $CTX.Response.Write($VALUE)
          - pattern-inside: |
              $TYPE $FUNCTION(HttpContext $CTX) {
                ...
              }
          - focus-metavariable: $VALUE

