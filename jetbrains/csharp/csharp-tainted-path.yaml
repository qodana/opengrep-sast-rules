rules:
  - id: csharp-tainted-path
    metadata:
      shortDescription: "User input reaching an insecure filesystem API"
      category: security
      cwe:
        - "CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
      owasp:
        - "A05:2017 - Broken Access Control"
        - "A01:2021 - Broken Access Control"
        - "A01:2025 - Broken Access Control"
    languages: [ csharp ]
    severity: ERROR
    message: >-
      User input (e.g., from the URL parameters) reaching an insecure filesystem API call 
      could result in a Path Traversal vulnerability
    mode: taint

    pattern-sources:
      - patterns:
          - pattern: $CTX.Request.QueryString[$KEY]
          - metavariable-type:
              metavariable: $CTX
              type: HttpContext

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: File.CreateText($PATH)
              - pattern: File.ReadAllText($PATH)
              - pattern: File.Exists($PATH)
              - pattern: new StreamWriter($PATH)
              - pattern: Directory.Exists($PATH)
          - focus-metavariable: $PATH


    pattern-sanitizers:
      - pattern-either:
          - patterns:
              - pattern: $CTX.Request.MapPath(...)
              - metavariable-type:
                  metavariable: $CTX
                  type: HttpContext
          - pattern: new Guid(...)
          - pattern: int.Parse(...)
