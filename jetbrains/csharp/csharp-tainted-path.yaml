rules:
  - id: csharp-codeql-tainted-path
    languages: [ csharp ]
    severity: ERROR
    message: Tainted data reaches a filesystem path
    mode: taint

    pattern-sources:
      - pattern: $CTX.Request.QueryString[$KEY]

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: File.CreateText($PATH)
              - pattern: new StreamWriter($PATH)
              - pattern: File.ReadAllText($PATH)
              - pattern: File.Exists($PATH)
          - focus-metavariable: $PATH
      - pattern: Directory.Exists($PATH)

    pattern-sanitizers:
      - pattern-either:
          - pattern: $CTX.Request.MapPath(...)
          - pattern: new Guid(...).ToString()
          - pattern: int.Parse(...).ToString()
