rules:
  - id: csharp-codeql-command-injection
    languages: [ csharp ]
    severity: ERROR
    message: >-
      Command injection: user-controlled input reaches `Process.Start` /
      `ProcessStartInfo` without validation. Pass the executable as a constant
      and arguments as a sanitized list.
    mode: taint

    pattern-sources:
      - pattern-either:
          - patterns:
              - pattern: $BOX.Text
              - metavariable-type:
                  metavariable: $BOX
                  type: TextBox
          - patterns:
              - pattern: $READER.ExecuteReader(...)
              - metavariable-type:
                  metavariable: $READER
                  type: System.Data.SqlClient.SqlCommand

    pattern-sinks:
      - pattern-either:
          - pattern: Process.Start($CMD, $ARGS)
          - pattern: new ProcessStartInfo($CMD, $ARGS)
          - patterns:
              - pattern-either:
                  - pattern: $INFO.FileName = $CMD
                  - pattern: $INFO.Arguments = $CMD
                  - pattern: $INFO.WorkingDirectory = $CMD
              - metavariable-type:
                  metavariable: $INFO
                  type: ProcessStartInfo
