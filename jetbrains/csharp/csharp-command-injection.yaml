rules:
  - id: csharp-command-injection
    metadata:
      category: security
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      owasp:
        - "A01:2017 - Injection"
        - "A03:2021 - Injection"
        - "A05:2025 - Injection"
    languages: [ csharp ]
    severity: ERROR
    message: >-
      User-controlled input reaches the process's starting logic without validation, leading to Command Injection vulnerability
    mode: taint

    pattern-sources:
      - pattern-either:
          - patterns:
              - pattern: $BOX.Text
              - metavariable-type:
                  metavariable: $BOX
                  type: TextBox
          - patterns:
              - pattern: $CMD.ExecuteReader()
              - pattern-either:
                  - pattern-inside: |
                      SqlCommand $CMD = new SqlCommand(...);
                      ...
                  - pattern-inside: |
                      var $CMD = new SqlCommand(...);
                      ...

    pattern-sinks:
      - pattern-either:
          - pattern: Process.Start($CMD, $ARGS)
          - pattern: new ProcessStartInfo($CMD, $ARGS)
          - patterns:
              - pattern-either:
                  - pattern: $INFO.$FIELD = $CMD
              - metavariable-type:
                  metavariable: $INFO
                  type: ProcessStartInfo
