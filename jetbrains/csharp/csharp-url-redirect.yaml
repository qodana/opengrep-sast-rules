rules:
  - id: csharp-url-redirect
    metadata:
      shortDescription: "User input reaches an Open Redirect target"
      category: security
      cwe:
        - "CWE-601: URL Redirection to Untrusted Site ('Open Redirect')"
      owasp:
        - "A05:2017 - Broken Access Control"
        - "A01:2021 - Broken Access Control"
        - "A01:2025 - Broken Access Control"
    languages: [ csharp ]
    severity: ERROR
    message: >-
      User-controlled input from the HTTP request query or form data reaches a redirect target,
      resulting in an Open Redirect vulnerability
    mode: taint

    pattern-sources:
      - pattern-either:
          - pattern: $CTX.Request.QueryString[$KEY]
          - patterns:
              - pattern: void $METHOD(..., [FromBody] string $VALUE, ...) { ... }
              - focus-metavariable: $VALUE

    pattern-sinks:
      - patterns:
          - pattern-either:
              - patterns:
                  - pattern: $CTX.Response.Redirect($URL)
                  - metavariable-pattern:
                      metavariable: $URL
                      patterns:
                        - pattern-not: $"..."
                        - pattern-not: string.Format(...)
                        - pattern-not: ... + ...
                        - pattern-not: $ANY.ToString()
              - patterns:
                  - pattern: $CTX.Response.Redirect($URL)
                  - metavariable-regex:
                      metavariable: $URL
                      regex: '^\$"\{[A-Za-z\.-_]*\}.asp\?'
              - patterns:
                  - pattern: $CTX.Response.Redirect(string.Format($FMT, ... , $URL))
                  - metavariable-regex:
                      metavariable: $FMT
                      regex: '^"\{[0-9]+\}\.asp\?'
              - pattern: $CTX.Server.Transfer($URL)
              - pattern: Redirect($URL)
              - pattern: RedirectToActionPermanent($URL)
              - pattern: RedirectToPage($URL)
              - pattern: Response.Redirect($URL)
              - pattern: Response.Headers[$KEY] = $URL
              - pattern: new Uri($URL)
              - patterns:
                  - pattern-either:
                      - pattern: Response.Headers.Add($HEADER, $URL)
                      - pattern: $CTX.Response.AddHeader($HEADER, $URL)
                      - pattern: $CTX.Response.AppendHeader($HEADER, $URL)
                      - pattern: Response.Headers.SetCommaSeparatedValues($HEADER, $URL)
                      - pattern: Response.Headers.Append($HEADER, $URL)
                      - pattern: Response.Headers.AppendCommaSeparatedValues($HEADER, $URL)
          - pattern-not-inside: |
              if($HELPER.IsLocalUrl($URL)) {
                ...
              }
          - pattern-not-inside: |
              if ($HELPER.IsUrlLocalToHost($URL)) {
                  ...
              }
          - pattern-not-inside: |
              if(IsLocalUrl($URL)) {
                ...
              }
          - pattern-not-inside: |
              if($VALID.Contains($URL)) {
                ...
              }
          - focus-metavariable: $URL

    pattern-sanitizers:
      - pattern-either:
          - pattern: HttpUtility.UrlEncode(...)
