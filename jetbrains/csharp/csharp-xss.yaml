rules:
  - id: csharp-codeql-xss
    languages: [ csharp ]
    severity: ERROR
    message: Tainted data reaches HTML output
    mode: taint

    pattern-sources:
      - pattern-either:
          - pattern: Request.QueryString[$KEY]
          - pattern: $REQ.QueryString[$KEY]
          - pattern: Request.Query[$KEY]
          - pattern: $REQ.Query[$KEY]
          - pattern: Request.QueryString.Value
          - pattern: $REQ.QueryString.Value
          - pattern: Request.Query
          - pattern: $REQ.Query
          - pattern: Request.ContentType
          - pattern: $REQ.ContentType
          - pattern: Request.Headers[$KEY]
          - pattern: $REQ.Headers[$KEY]
          - patterns:
              - pattern: public IActionResult $METHOD([FromQuery] string $VALUE, ...) { ... }
              - focus-metavariable: $VALUE
          - patterns:
              - pattern: public IActionResult $METHOD([FromQuery] string $VALUE) { ... }
              - focus-metavariable: $VALUE

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: WriteLiteral($VALUE)
              - pattern: WriteLiteralTo($OUT, $VALUE)
              - pattern: Write($VALUE)
              - pattern: Html.Raw($VALUE)
              - pattern: new HtmlString($VALUE)
          - focus-metavariable: $VALUE
          - pattern-not: WriteLiteral(HttpUtility.HtmlEncode(...))
          - pattern-not: WriteLiteralTo($OUT, Html.Encode(...))
          - pattern-not: Write(Html.Raw(HttpContext.Current.Server.HtmlEncode(...)))
      - pattern: new HtmlString(...)

    pattern-sanitizers:
      - pattern-either:
          - pattern: Html.Encode(...)
          - pattern: HttpUtility.HtmlEncode(...)
          - pattern: HttpContext.Current.Server.HtmlEncode(...)
